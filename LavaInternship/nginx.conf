server {
  listen 80;
  server_name localhost;

  # The root directory where your React app's static files are located
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # This is the crucial part.
    # It tells Nginx to try serving the requested file ($uri),
    # then try it as a directory ($uri/),
    # and if both fail, fall back to serving /index.html.
    # This allows React Router to handle the routing.
    try_files $uri $uri/ /index.html;
  }

  # Optional: You can add custom error pages if you want
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}