version: "3.9"

services:
  # --- SQL Server Database Service ---
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: resume_screener_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=W^L1*hIGs0sisL9h
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 4g

  # --- MSSQL Init Script Runner ---
  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: resume_screener_db_init
    depends_on:
      - mssql
    volumes:
      - ./mssql-init/init.sql:/init.sql:ro
    entrypoint: >
      /bin/bash -c "
      echo '⏳ Waiting for SQL Server to start...' &&
      until /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P 'W^L1*hIGs0sisL9h' -Q 'SELECT 1' > /dev/null 2>&1;
      do
        sleep 2
      done &&
      echo '✅ SQL Server is up. Running init script...' &&
      /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P 'W^L1*hIGs0sisL9h' -d master -i /init.sql &&
      echo '✅ Database initialized successfully'
      "

  # --- FastAPI Backend Service ---
  backend:
    build: ./FastApi
    container_name: resume_screener_backend
    env_file:
      - ./FastApi/.env
    ports:
      - "8000:8000"
    volumes:
      - ./FastApi/app:/app/app
      - ../uploads:/app/uploads
    depends_on:
      - mssql
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- React Frontend Service ---
  frontend:
    build: ./LavaInternship
    container_name: resume_screener_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mssql_data:
